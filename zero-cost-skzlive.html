<!DOCTYPE html>
<html lang="zh-cn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>如何参与樱坂46现场演出门票FanClub抽选？</title>
  <link rel="stylesheet" href="style.css?v=1.1">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <header class="site-header">
    <a class="site-brand" href="/">KAGENARE</a>
    <nav class="site-nav" aria-label="Primary">
      <a href="/">podcast</a>
      <a href="/zero-cost-skzlive.html">How I Learned to join sakurazaka46 Live</a>
    </nav>
  </header>

  <div class="container doc-container">
    <button class="toc-toggle" id="tocToggle">目录</button>

    <div class="toc" id="toc">
      <h2>目录</h2>
      <ul id="toc-list">
        <!-- The generated table of contents will be inserted here -->
      </ul>
    </div>

    <div class="main-content">
      <div class="card">
        <div class="markdown-content">
          <div id="markdown-content"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Markdown renderer -->
  <script>
    // Load the Markdown file and render its content.
    async function loadMarkdownFile() {
      try {
        console.log('开始加载 Markdown 文件');
        // 1. Load the Markdown file.
        const response = await fetch('how-to-buy-sakurazaka46-tickets.md', { mode: 'no-cors' });
        console.log('响应状态:', response.status);
        // Note: no-cors responses cannot be read directly.
        // Use a separate loader for the file content.
        
        // Use XMLHttpRequest as a fallback loader.
        const markdownText = await loadMarkdownWithXHR();
        
        // 2. Render Markdown to HTML with marked.js.
        const markdownContent = document.getElementById('markdown-content');
        console.log('找到 markdown-content 元素:', !!markdownContent);
        if (markdownContent) {
          markdownContent.innerHTML = marked.parse(markdownText);
          console.log('Markdown 渲染完成');
        } else {
          console.error('未找到 ID 为 markdown-content 的元素');
        }

        // 3. Generate the table of contents.
        console.log('开始生成目录');
        generateTOC();
      } catch (error) {
        console.error('无法加载 Markdown 文件:', error);
        // Try loading with XMLHttpRequest.
        try {
          const markdownText = await loadMarkdownWithXHR();
          const markdownContent = document.getElementById('markdown-content');
          if (markdownContent) {
            markdownContent.innerHTML = marked.parse(markdownText);
            console.log('使用 XHR 加载成功');
            generateTOC();
          }
        } catch (xhrError) {
          console.error('XHR 加载也失败了:', xhrError);
        }
      }
    }
    
    // Load the Markdown file with XMLHttpRequest.
    function loadMarkdownWithXHR() {
      return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open('GET', 'how-to-buy-sakurazaka46-tickets.md', true);
        xhr.onreadystatechange = function() {
          if (xhr.readyState === 4) {
            if (xhr.status === 200) {
              resolve(xhr.responseText);
            } else {
              reject(new Error(`XHR Error: ${xhr.status}`));
            }
          }
        };
        xhr.send();
      });
    }

    // Generate the table of contents.
    function generateTOC() {
      console.log('执行 generateTOC 函数');
      const markdownContent = document.getElementById('markdown-content');
      const tocList = document.getElementById('toc-list');
      
      console.log('markdownContent 元素:', !!markdownContent);
      console.log('tocList 元素:', !!tocList);

      if (!markdownContent || !tocList) {
        console.error('缺少必要的 DOM 元素');
        return;
      }

      // Find all heading elements (h1, h2, h3, ...).
      const headers = markdownContent.querySelectorAll('h1, h2, h3, h4, h5, h6');
      console.log('找到标题元素数量:', headers.length);

      headers.forEach((header, index) => {
        // 1. Create a unique ID.
        const id = `header-${index}`;
        header.id = id;

        // 2. Create a TOC item.
        const li = document.createElement('li');
        const level = parseInt(header.tagName.substring(1));
        li.className = `toc-level-${level}`; // Add the level class.

        const a = document.createElement('a');
        a.href = `#${id}`;
        a.textContent = header.textContent;
        a.setAttribute('data-target', id); // Used for active state tracking.

        li.appendChild(a);
        tocList.appendChild(li);
      });

      // Add smooth scrolling.
      enableSmoothScroll();
      
      // Start active state tracking.
      setupActiveTracking();
    }

    // Smooth scrolling.
    function enableSmoothScroll() {
      document.querySelectorAll('.toc a').forEach(anchor => {
        anchor.addEventListener('click', function (e) {
          e.preventDefault();
          const targetId = this.getAttribute('href').substring(1);
          const target = document.getElementById(targetId);

          if (target) {
            window.scrollTo({
              top: target.offsetTop - 100, // Keep the target slightly below the viewport top.
              behavior: 'smooth'
            });
            
            // Hide the TOC after tapping an item on mobile.
            if (window.innerWidth <= 1024) {
              document.getElementById('toc').classList.remove('open');
            }
          }
        });
      });
    }

    // Set up active state tracking.
    function setupActiveTracking() {
      const headers = document.querySelectorAll('#markdown-content h1, #markdown-content h2, #markdown-content h3, #markdown-content h4, #markdown-content h5, #markdown-content h6');
      const links = document.querySelectorAll('.toc a');
      
      console.log('设置活动状态跟踪，标题数量:', headers.length, '链接数量:', links.length);
      
      function setActiveLink() {
        let currentHeader = null;
        
        // Find the current heading in the viewport.
        for (let i = headers.length - 1; i >= 0; i--) {
          const header = headers[i];
          const rect = header.getBoundingClientRect();
          
          if (rect.top <= 120) { // Activate the matching TOC item near the top.
            currentHeader = header;
            break;
          }
        }
        
        // Remove all active states.
        links.forEach(link => link.classList.remove('active'));
        
        // Activate the link for the current heading.
        if (currentHeader) {
          const targetId = currentHeader.id;
          const activeLink = document.querySelector(`.toc a[data-target="${targetId}"]`);
          if (activeLink) {
            activeLink.classList.add('active');
            
            // Keep the active item visible in the viewport.
            activeLink.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
          }
        }
      }
      
      // Update active state while scrolling.
      window.addEventListener('scroll', setActiveLink);
      
      // Initial setup.
      setActiveLink();
    }

    // TOC toggle.
    document.getElementById('tocToggle').addEventListener('click', function() {
      document.getElementById('toc').classList.toggle('open');
    });

    // Close the TOC when clicking outside it.
    document.addEventListener('click', function(event) {
      const toc = document.getElementById('toc');
      const tocToggle = document.getElementById('tocToggle');
      
      if (window.innerWidth <= 1024 && 
          !toc.contains(event.target) && 
          event.target !== tocToggle && 
          !tocToggle.contains(event.target)) {
        toc.classList.remove('open');
      }
    });

    // Run after the page loads.
    document.addEventListener('DOMContentLoaded', function() {
      console.log('DOM 加载完成，开始加载 Markdown 文件');
      // Delay Markdown loading until the page shell is ready.
      setTimeout(loadMarkdownFile, 100);
    });
  </script>
</body>
</html>
